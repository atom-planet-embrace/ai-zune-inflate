## Ensure the crate builds in no_std environments
name: Build no_std

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: no_std / ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain:
          - stable
          - beta
          - nightly
    steps:
      - uses: actions/checkout@v6
      - run: rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
      # Target below does not have a standard library
      - run: rustup target add x86_64-unknown-uefi
      - run: cargo build --target x86_64-unknown-uefi --no-default-features
      - run: cargo build --target x86_64-unknown-uefi --no-default-features --features zlib
      - run: cargo build --target x86_64-unknown-uefi --no-default-features --features gzip
